name: Show Image During Specific Hours

on:
  schedule:
    - cron: '15 2 * * *'  # 8:00 AM NPT (2:15 AM UTC) - Show image
    - cron: '15 13 * * *' # 7:00 PM NPT (1:15 PM UTC) - Hide image
  workflow_dispatch:  # Allows manual execution

jobs:
  update-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: image-branch  # Checkout image-branch

      - name: Show Image at 8 AM NPT
        if: github.event.schedule == '15 2 * * *'
        run: |
          echo "Showing image..."
          echo '<img class="slide" src="test.png" alt="Image 1" data-media-type="image">' > index.html
          git add index.html
          git commit -m "Show image at 8 AM NPT"
          git push origin image-branch

      - name: Hide Image at 7 PM NPT
        if: github.event.schedule == '15 13 * * *'
        run: |
          echo "Hiding image..."
          echo '<p>The image is now hidden.</p>' > index.html
          git add index.html
          git commit -m "Hide image at 7 PM NPT"
          git push origin image-branch

      - name: Merge image-branch into master
        run: |
          git fetch origin
          git checkout master
          git merge origin/image-branch
          git push origin master
